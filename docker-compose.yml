services:
  postgres:
    image: postgres:17-alpine
    container_name: job-prep-assistant-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: jobprep
      POSTGRES_PASSWORD: jobprep
      POSTGRES_DB: jobprep
    ports:
      - "5432:5432"
    volumes:
      - job-prep-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jobprep -d jobprep"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  job-prep-postgres-data:
